services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-voiceorder}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voiceorder}
      POSTGRES_DB: ${POSTGRES_DB:-voiceorder}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-voiceorder}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
    ports:
      - "8000:8000"
    volumes:
      - ./server/src:/app/src
      - ./server/alembic:/app/alembic
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-voiceorder}:${POSTGRES_PASSWORD:-voiceorder}@postgres:5432/${POSTGRES_DB:-voiceorder}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uv run uvicorn voiceorder_server.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir src

  agent:
    build:
      context: ./agent
    volumes:
      - ./agent/src:/app/src
    env_file:
      - .env
    environment:
      VOICEORDER_API_URL: http://server:8000
    depends_on:
      - server

  dashboard:
    build:
      context: ./dashboard
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - ./dashboard/src:/app/src
      - ./dashboard/public:/app/public
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000

volumes:
  postgres_data:
  redis_data:
